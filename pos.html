<div class="pos-container">

  <!-- LEFT -->
  <div class="left-panel">

    <h3>🔎 Recherche Produit</h3>
    <input type="text" id="search" placeholder="Nom ou code produit">
    <div id="results"></div>

    <h3>📦 Catégories</h3>
    <div id="category-boxes"></div>

    <h3>🛍 Produits</h3>
    <div id="product-grid"></div>

  </div>

  <!-- CENTER -->
  <div class="center-panel">

    <h3>🧮 Calculatrice</h3>
    <input type="text" id="display" readonly>

    <div class="calc">
      <button>1</button><button>2</button><button>3</button>
      <button>4</button><button>5</button><button>6</button>
      <button>7</button><button>8</button><button>9</button>
      <button>0</button><button>C</button>
    </div>

    <div class="selected-box">

      <h3 id="selected-name">-</h3>
      <p>Prix: <span id="selected-price">0</span> FCFA</p>

      <button onclick="minusQty()">-</button>
      <span id="qty">1</span>
      <button onclick="plusQty()">+</button>

      <br><br>
      <button onclick="addToCart()">Ajouter à la facture</button>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="right-panel" id="invoice-section">

    <h3>🧾 Facture</h3>

    <h4>N° <span id="invoice-id"></span></h4>

    <h2>✨ Bienvenue à Éclat de Coco Officiel</h2>
    <p>Abidjan - Côte d'Ivoire</p>

    <hr>

    <h4>📅 Date</h4>
    <input type="date" id="invoice-date">

    <hr>

    <h4>Client</h4>
    <input type="text" id="client-name">
    <input type="text" id="client-phone">
    <input type="text" id="client-address">

    <hr>

    <table>
      <thead>
        <tr>
          <th>Produit</th>
          <th>Qté</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="invoice"></tbody>
    </table>

    <hr>

    <h4>Livraison</h4>
    <input type="number" id="delivery">

    <hr>

    <h2 id="total">0 FCFA</h2>

    <div style="display:flex; gap:10px;">
      <button id="print-btn">🖨 Imprimer</button>
      <button id="save-btn">💾 Sauvegarder</button>
    </div>

    <p style="text-align:center; margin-top:10px;">
      Merci de choisir Éclat de Coco 💗
    </p>

  </div>

</div>
