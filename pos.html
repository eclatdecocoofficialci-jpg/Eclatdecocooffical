<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Éclat de Coco - POS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Éclat de Coco – POS</h1>
</header>

<div class="pos-container">

  <!-- LEFT : CATEGORIES -->
  <div class="left-panel">
    <h3>Catégories</h3>
    <div id="category-boxes"></div>
  </div>

  <!-- CENTER -->
  <div class="center-panel">

    <h3>🔎 Recherche</h3>
    <input type="text" id="search" placeholder="Nom produit">

    <div id="product-list"></div>

    <h3>🧮 Calculatrice</h3>
    <input id="display" readonly>

    <div class="calc">
      <button onclick="press(7)">7</button>
      <button onclick="press(8)">8</button>
      <button onclick="press(9)">9</button>
      <button onclick="press('+')">+</button>

      <button onclick="press(4)">4</button>
      <button onclick="press(5)">5</button>
      <button onclick="press(6)">6</button>
      <button onclick="press('-')">-</button>

      <button onclick="press(1)">1</button>
      <button onclick="press(2)">2</button>
      <button onclick="press(3)">3</button>
      <button onclick="press('*')">×</button>

      <button onclick="press(0)">0</button>
      <button onclick="clearCalc()">C</button>
      <button onclick="calculate()">=</button>
      <button onclick="press('/')">÷</button>
    </div>

    <div style="margin-top:10px;">
      <button onclick="setDiscount(20)">-20%</button>
      <button onclick="setDiscount(50)">-50%</button>
    </div>

  </div>

  <!-- RIGHT : FACTURE -->
  <div class="right-panel" id="invoice-section">

    <h2 style="text-align:center;">✨ Bienvenue à Éclat de Coco</h2>
    <p style="text-align:center;">Abidjan - Côte d'Ivoire</p>

    <h4>N° Facture : <span id="invoice-id"></span></h4>

    <input type="date" id="date">

    <input type="text" id="client-name" placeholder="Nom client">
    <input type="text" id="client-phone" placeholder="Téléphone">
    <input type="text" id="client-address" placeholder="Adresse">

    <table>
      <thead>
        <tr>
          <th>Produit</th>
          <th>Qté</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="invoice"></tbody>
    </table>

    <h4>Livraison</h4>
    <input type="number" id="delivery" placeholder="Frais livraison">

    <h2 id="total">0 FCFA</h2>

    <button onclick="window.print()">🖨 Imprimer</button>
    <button onclick="saveSale()">💾 Sauvegarder</button>

    <p style="text-align:center;">Merci de choisir Éclat de Coco 💗</p>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
