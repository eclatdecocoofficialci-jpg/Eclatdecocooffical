<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Éclat de Coco Official</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  /* MARBLE LUXURY BACKGROUND */
  background-image: url("https://images.unsplash.com/photo-1523413651479-597eb2da0ad6");
  background-size:cover;
  background-position:center;
}

/* soft pink overlay */
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(255, 192, 203, 0.25);
}

/* CENTER CARD */
.card{
  position:relative;
  background:rgba(255,255,255,0.88);
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
  backdrop-filter: blur(6px);
}

h1{
  color:#e91e63;
  font-size:22px;
  margin-bottom:10px;
}

p{
  color:#555;
  font-size:14px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:2px solid #f8bbd0;
  margin-top:15px;
  text-align:center;
  font-size:16px;
  outline:none;
}

/* BUTTON */
button{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#e91e63;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#c2185b;
}

/* small text */
.small{
  font-size:12px;
  margin-top:10px;
  color:#777;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">
  <h1>✨ Welcome to Éclat de Coco Official</h1>
  <p>Luxury Business Management System</p>

  <input type="password" id="code" placeholder="Enter Access Code">

  <button onclick="enterApp()">Enter POS</button>

  <div class="small">Secure access required</div>
</div>

<script>
function enterApp(){
  const code = document.getElementById("code").value;

  if(code === "29121509"){
    window.location.href = "pos.html";
  } else {
    alert("Incorrect code ❌");
  }
}
</script>

</body>
</html>
